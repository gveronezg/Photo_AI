{% extends 'base.html' %}
{% block title %} Projetos | Meu Portifólio {% endblock %}
{% block content %}
<section>
    <h1>Meus Projetos</h1>
    <p>Aqui estão alguns dos projetos que desenvolvi</p>
    <ul>
        {% for key, datas in projetos.items %}
        <!-- no href trago o name do url junto com o id do projeto -->
        <li><a href="{% url 'detalhes_projeto' id_projeto=key %}">{{ datas.titulo }}</a></li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
